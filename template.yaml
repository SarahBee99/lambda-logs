AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: A simple serverless application.

Resources:
  SimpleGreetingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: hello.lambda_handler
      Runtime: python3.14
      CodeUri: ./src
      Events:
        HelloWorldApi:
          Type: Api
          Properties:
            Path: /greet
            Method: get

Outputs:
  PublicApiUrl:
    Description: "The live URL for your API Gateway"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/greet"

